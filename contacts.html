<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Ms+Madi&display=swap" rel="stylesheet">

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        scroll-behavior: smooth;
    }

    .section {
        width: 100%;
        min-height: 100vh;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
    }

    .one  { background-image: url('Background1.png'); }
    .two  { background-image: url('Background2.png'); height: 101vh; }
    .three { background-image: url('Background3.png'); height: 101vh; }

   /* NAV RIGHT SIDE */
    nav {
        position: absolute;
        top: 50px;
        right: 300px;
    }

    nav a {
        display: inline-block;
        background-color: #353c4e;
        color: #fffcf2;
        padding: 12px 65px;
        margin-left: 10px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 25px;
    }

    nav a.unactive {
        background-color: #353c4e;
        color: #fffcf2;
    }

    /* LIGHT BLUE HOVER + ACTIVE */
    nav a:hover {
        background-color: #353c4e;
        color: #565e71;
    }

    nav a.active {
        background-color:  #353c4e;
        color: #565e71;
    }

    nav:hover a.active {
        background-color: #353c4e;
        color: #fffcf2;
    }

    nav a.active:hover {
        background-color: #353c4e;
        color: #565e71;
    }


    /* SMALL TITLE LEFT */
    .small-title {
        position: absolute;
        top: 0px;
        left: 200px;
        color: #fffcf2;
        font-size: 40px;
        font-family: 'Ms Madi', cursive;
        letter-spacing: 2px;
        font-weight: normal;
    }

</style>
</head>

<body>
<div class="section three">
 <nav>
        <a href="Gabriella Vella Portfolio.html" class="unactive">Home</a>
        <a href="about.html" class="unactive">About</a>
        <a href="projects.html" class="unactive">Projects</a>
        <a href="contacts.html" class="active">Contact</a>
    </nav>

    <h4 class="small-title">Gabriella Vella Portfolio</h4>
</div>
</body>
</html>
